name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v4.4.3)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.12.x
      - name: Install dependencies
        run: npm ci --force
      - name: Build extension
        run: npm run prod
      # For dispatched releases the body comes from .github/RELEASE_NOTES.md —
      # update that file before dispatching. Tag-push releases use the
      # annotated tag's message instead.
      - name: Create GitHub release (from dispatched tag input)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release create "${TAG}" conversations.xpi \
            --title "${TAG}" \
            --target "${GITHUB_SHA}" \
            --notes-file .github/RELEASE_NOTES.md
      - name: Create GitHub release (from pushed tag)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" conversations.xpi \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag \
            --notes-from-tag
